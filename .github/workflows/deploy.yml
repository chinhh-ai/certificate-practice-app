name: Test & Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  test-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['20.x']
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ============== Frontend Tests ==============
      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:5000'

      # ============== Backend Tests ==============
      - name: Install backend dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Check backend imports
        run: cd backend && python -c "import main; print('✅ Backend imports OK')"
        continue-on-error: true

      # ============== AI Core Tests ==============
      - name: Install AI Core dependencies
        run: cd ai-core && pip install -r requirements.txt

      - name: Check AI Core imports
        run: cd ai-core && python -c "import main; print('✅ AI Core imports OK')" 
        continue-on-error: true

      # ============== Build Success ==============
      - name: Build Status
        if: success()
        run: echo "✅ All builds passed successfully!"

      - name: Build Failed
        if: failure()
        run: echo "❌ Build failed - check logs above" && exit 1
